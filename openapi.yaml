  # ── TRANSACTION MONITORING ──────────────────────────────────

  /api/v1/monitoring/limit:
    get:
      tags: [Transaction Monitoring]
      summary: Get Transaction Limit
      operationId: getLimit
      responses:
        "200":
          description: Limit retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  limit: { type: number, example: 200000 }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [Transaction Monitoring]
      summary: Set Transaction Limit
      operationId: setLimit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [limit]
              properties:
                limit: { type: number, example: 100000 }
      responses:
        "200": { description: Limit updated }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/monitoring/threshold:
    get:
      tags: [Transaction Monitoring]
      summary: Get Fraud Alert Threshold
      operationId: getThreshold
      responses:
        "200":
          description: Threshold retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  threshhold: { type: number, example: 7 }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [Transaction Monitoring]
      summary: Set Fraud Alert Threshold
      operationId: setThreshold
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [threshhold]
              properties:
                threshhold:
                  type: number
                  description: "Note: double-h spelling is required by the API"
                  example: 70
      responses:
        "200": { description: Threshold updated }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/monitoring/transaction_monitoring/:
    post:
      tags: [Transaction Monitoring]
      summary: Submit Transaction for Monitoring
      operationId: submitTransaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                [
                  transaction_id,
                  amount,
                  currency,
                  transaction_type,
                  account_type,
                  origin_account,
                  destination_account,
                  customer_details,
                  additional_info,
                ]
              properties:
                transaction_id:
                  type: string
                  example: "TXN-12345678"
                amount:
                  type: number
                  example: 50000
                currency:
                  type: string
                  example: "NGN"
                transaction_type:
                  type: string
                  enum: [transfer, ussd, web]
                account_type:
                  type: string
                  enum: [individual, corporate]
                origin_account:
                  type: object
                  required: [account_number, bank_code]
                  properties:
                    account_number: { type: string, example: "9876543219" }
                    bank_code: { type: string, example: "001" }
                destination_account:
                  type: object
                  required: [account_number, bank_code]
                  properties:
                    account_number: { type: string, example: "123456789" }
                    bank_code: { type: string, example: "002" }
                customer_details:
                  type: object
                  required: [customer_name, customer_email]
                  properties:
                    customer_name: { type: string }
                    customer_email: { type: string, format: email }
                    bvn: { type: string }
                additional_info:
                  type: object
                  required: [ip_address, location]
                  properties:
                    ip_address: { type: string, example: "192.168.1.1" }
                    location: { type: string, example: "Lagos, Nigeria" }
                    transaction_description: { type: string }
                run_kyc:
                  type: boolean
                  default: false
      responses:
        "201": { description: Transaction processed }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ── TRANSACTION SCREENING ────────────────────────────────────

  /api/v1/monitoring/transaction_screening/:
    post:
      tags: [Transaction Screening]
      summary: Screen a Transaction
      operationId: screenTransaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, transactionDate, sender, receiver]
              properties:
                transactionId: { type: string }
                transactionType: { type: string, example: "Transfer" }
                amount: { type: number, example: 10000.00 }
                currency: { type: string, example: "NGN" }
                transactionDate:
                  type: string
                  format: date-time
                  example: "2024-07-06T12:34:56Z"
                sender:
                  type: object
                  required: [name]
                  properties:
                    name: { type: string }
                    accountNumber: { type: string }
                    address:
                      type: object
                      properties:
                        street: { type: string }
                        city: { type: string }
                        state: { type: string }
                        postalCode: { type: string }
                        country: { type: string }
                    identification:
                      type: object
                      properties:
                        type: { type: string }
                        number: { type: string }
                        country: { type: string }
                receiver:
                  type: object
                  required: [name]
                  properties:
                    name: { type: string }
                    accountNumber: { type: string }
                    address:
                      type: object
                      properties:
                        street: { type: string }
                        city: { type: string }
                        state: { type: string }
                        postalCode: { type: string }
                        country: { type: string }
                details:
                  type: object
                  properties:
                    purpose: { type: string }
                    reference: { type: string }
      responses:
        "201": { description: Transaction screened }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

