  /api/onboarding/kenya_kyc/kra_pin/:
    post:
      tags: [Kenya KYC]
      summary: KRA PIN Verification
      operationId: kraPin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pin]
              properties:
                pin:
                  type: string
                  description: Kenya Revenue Authority PIN
                  example: "A000000000Z"
      responses:
        "200": { description: KRA PIN verified }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/onboarding/kenya_kyc/passport/:
    post:
      tags: [Kenya KYC]
      summary: Kenya Passport Verification
      operationId: kenyaPassport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [passport_number]
              properties:
                passport_number: { type: string }
      responses:
        "200": { description: Passport verified }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ── GHANA KYC ───────────────────────────────────────────────

  /api/onboarding/ghana_kyc/id_card/:
    post:
      tags: [Ghana KYC]
      summary: Ghana ID Card
      operationId: ghanaIdCard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [identification_number, id_type]
              properties:
                identification_number:
                  type: string
                  description:
                    Ghana Card, Passport, Voter ID, SSNIT, or Driver's License
                    number
                id_type:
                  type: string
                  description:
                    "GhanaCard, Passport, VoterID, SSNIT, or DriversLicense"
      responses:
        "200": { description: ID card verified }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/onboarding/ghana_kyc/id_card_with_face/:
    post:
      tags: [Ghana KYC]
      summary: Ghana ID Card with Face
      operationId: ghanaIdCardWithFace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [identification_number, selfie_image]
              properties:
                identification_number:
                  type: string
                  description: Ghana Card number
                selfie_image:
                  type: string
                  description: Base64-encoded selfie image
      responses:
        "200": { description: ID card with face verified }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ── RWANDA KYC ──────────────────────────────────────────────

  /api/onboarding/rwanda_kyc/national_id/:
    post:
      tags: [Rwanda KYC]
      summary: Rwanda National ID
      operationId: rwandaNationalId
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [national_id]
              properties:
                national_id:
                  type: string
                  example: "1199780123456789"
      responses:
        "200": { description: National ID verified }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/onboarding/rwanda_kyc/passport/:
    post:
      tags: [Rwanda KYC]
      summary: Rwanda Passport
      operationId: rwandaPassport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
