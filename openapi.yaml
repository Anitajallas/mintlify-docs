    post:
      tags: [Kenya KYC]
      summary: Kenya National ID Advanced
      operationId: kenyaNationalIdAdvanced
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id_number]
              properties:
                id_number:
                  type: string
                  example: "12345678"
      responses:
        "200": { description: National ID advanced data retrieved }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/onboarding/kenya_kyc/business_registration/:
    post:
      tags: [Kenya KYC]
      summary: Kenya Business Registration
      operationId: kenyaBusinessRegistration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [registration_number]
              properties:
                registration_number:
                  type: string
                  example: "BUS/2020/123456"
                postal_code: { type: string }
                postal_address: { type: string }
      responses:
        "200": { description: Business registration verified }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/onboarding/kenya_kyc/alien_id/:
    post:
      tags: [Kenya KYC]
      summary: Kenya Alien ID
      operationId: kenyaAlienId
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [alien_id]
