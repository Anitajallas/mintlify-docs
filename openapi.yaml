  # ── LOAN FRAUD ──────────────────────────────────────────────

  /api/v1/loan/fraud_check/:
    post:
      tags: [Loan Fraud]
      summary: Loan Fraud Check
      operationId: loanFraudCheck
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                [
                  loan_amount_requested,
                  loan_repayment_duration_type,
                  loan_repayment_duration_value,
                  collateral_required,
                ]
              properties:
                first_name:
                  { type: string, description: Individual applicant first name }
                last_name: { type: string }
                business_name:
                  {
                    type: string,
                    description: Business name (business applications only),
                  }
                rc_number:
                  {
                    type: string,
                    description: CAC registration number (business only),
                  }
                date_of_birth: { type: string, format: date }
                gender: { type: string, enum: [male, female] }
                country: { type: string, example: "Nigeria" }
                current_address: { type: string }
                business_address: { type: string }
                identification_type: { type: string, example: "Passport" }
                identification_number: { type: string }
                bvn: { type: string }
                phone_number: { type: string }
                email_address: { type: string, format: email }
                employment_type: { type: string }
                job_role: { type: string }
                employer_name: { type: string }
                annual_income: { type: number }
                annual_revenue:
                  { type: number, description: Annual revenue (business only) }
                employment_duration: { type: string }
                bank_name: { type: string }
                account_number: { type: string }
                loan_amount_requested: { type: number, example: 100000 }
                purpose_of_loan: { type: string }
                loan_repayment_duration_type:
                  { type: string, enum: [weeks, months, years] }
                loan_repayment_duration_value: { type: integer, example: 6 }
                collateral_required: { type: boolean, default: false }
                collateral: { type: string }
                is_individual:
                  {
                    type: boolean,
                    description: Set true for individual applications,
                  }
                is_business:
                  {
                    type: boolean,
                    description: Set true for business applications,
                  }
                run_aml_check: { type: boolean, default: false }
      responses:
        "200": { description: Loan fraud check processed }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

