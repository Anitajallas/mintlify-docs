openapi: 3.0.3
info:
  title: Adhere API
  description:
    Identity verification, credit checks, transaction monitoring, and loan fraud
    detection across Africa.
  version: "3.0.0"

servers:
  - url: https://adhere-api.smartcomply.com
    description: Production

security:
  - ApiKeyAuth: []

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-access-token
      description: Your Adhere API secret key

  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: string
                example: failed
              data:
                type: array
                items: {}
              message:
                type: string
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: string
                example: failed
              message:
                type: string
                example: Authentication credentials were not provided.

tags:
  - name: Nigeria KYC
  - name: Kenya KYC
  - name: Ghana KYC
  - name: Rwanda KYC
  - name: Uganda KYC
  - name: Biometrics
  - name: Individual Credit
  - name: Business Credit
  - name: Transaction Monitoring
  - name: Transaction Screening
  - name: Transaction KYC
  - name: Loan Fraud
  - name: User Journey

paths:
  # ── BIOMETRICS ──────────────────────────────────────────────

  /api/onboarding/biometrics/face/comparison:
    post:
      tags: [Biometrics]
      summary: Face Comparison
      operationId: faceComparison
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [image_url, selfie_url]
              properties:
                image_url:
                  type: string
                  description: URL of the reference ID photo
                selfie_url:
                  type: string
                  description: URL of the selfie image
      responses:
        "200": { description: Comparison successful }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/onboarding/biometrics/face/liveliness_check/:
    post:
      tags: [Biometrics]
      summary: Face Liveness Check
      operationId: faceLiveness
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  description: URL of the image to check for liveness
      responses:
        "200": { description: Liveness check successful }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ── NIGERIA KYC ─────────────────────────────────────────────

  /api/onboarding/nigeria_kyc/bvn/:
    post:
      tags: [Nigeria KYC]
      summary: BVN Verification
      operationId: bvn
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bvn]
              properties:
                bvn:
                  type: string
                  minLength: 11
                  maxLength: 11
                  description: 11-digit Bank Verification Number
                  example: "22244545518"
      responses:
        "200": { description: BVN verified successfully }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/onboarding/nigeria_kyc/bvn_advanced/:
    post:
      tags: [Nigeria KYC]
      summary: BVN Advanced
      operationId: bvnAdvanced
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bvn]
              properties:
                bvn:
                  type: string
                  description: 11-digit Bank Verification Number
                  example: "22244545518"
      responses:
        "200": { description: BVN advanced data retrieved }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/onboarding/nigeria_kyc/bvn_with_face/:
    post:
      tags: [Nigeria KYC]
      summary: BVN with Face
      operationId: bvnWithFace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bvn, image_url]
              properties:
                bvn:
                  type: string
                  description: 11-digit Bank Verification Number
                  example: "22244545518"
                image_url:
                  type: string
                  description: URL of the selfie image
      responses:
        "200": { description: BVN with face verified }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/onboarding/nigeria_kyc/nin/:
    post:
      tags: [Nigeria KYC]
      summary: NIN Verification
      operationId: nin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nin]
              properties:
                nin:
                  type: string
                  description: 11-digit National Identification Number
                  example: "12345678901"
      responses:
        "200": { description: NIN verified successfully }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/onboarding/nigeria_kyc/nin_with_face/:
    post:
      tags: [Nigeria KYC]
      summary: NIN with Face
      operationId: ninWithFace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nin, image_url]
              properties:
                nin:
                  type: string
                  description: 11-digit NIN
                  example: "12345678901"
                image_url:
                  type: string
                  description: URL of the selfie image
      responses:
        "200": { description: NIN with face verified }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/onboarding/nigeria_kyc/vnin/:
    post:
      tags: [Nigeria KYC]
      summary: Virtual NIN (VNIN)
      operationId: vnin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [vnin]
              properties:
                vnin:
                  type: string
                  description: 16-character Virtual NIN
                  example: "WB9D9SE8HA41Z2M0"
      responses:
        "200": { description: VNIN verified }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/onboarding/nigeria_kyc/voters_id/:
    post:
      tags: [Nigeria KYC]
      summary: Voter's ID
      operationId: votersId
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [vin]
              properties:
                vin:
                  type: string
                  description: Voter Identification Number
                  example: "95C67890123400001"
      responses:
        "200": { description: Voter's ID verified }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/onboarding/nigeria_kyc/driver_license/:
    post:
      tags: [Nigeria KYC]
      summary: Driver's License
      operationId: driverLicense
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [license_number]
              properties:
                license_number:
                  type: string
                  description: Driver's license number
                  example: "AAA00000AA00"
      responses:
        "200": { description: Driver's license verified }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/onboarding/nigeria_kyc/passport/:
    post:
      tags: [Nigeria KYC]
      summary: Passport Verification
      operationId: nigeriaPassport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [passport_number]
              properties:
                passport_number:
                  type: string
                  example: "A00000000"
      responses:
        "200": { description: Passport verified }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/onboarding/nigeria_kyc/tin/:
    post:
      tags: [Nigeria KYC]
      summary: Tax Identification Number (TIN)
      operationId: tin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tin]
              properties:
                tin:
                  type: string
                  example: "12345678-0001"
      responses:
        "200": { description: TIN verified }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/onboarding/nigeria_kyc/nuban/:
    post:
      tags: [Nigeria KYC]
      summary: NUBAN Verification
      operationId: nuban
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [account_number, bank_code]
              properties:
                account_number:
                  type: string
                  description: 10-digit account number
                  example: "0123456789"
                bank_code:
                  type: string
                  example: "044"
      responses:
        "200": { description: NUBAN verified }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/onboarding/nigeria_kyc/nuban_advanced/:
    post:
      tags: [Nigeria KYC]
      summary: NUBAN Advanced
      operationId: nubanAdvanced
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [account_number, bank_code]
              properties:
                account_number:
                  type: string
                  example: "0123456789"
                bank_code:
                  type: string
