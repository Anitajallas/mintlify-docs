      responses:
        "200": { description: NUBAN advanced data retrieved }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/onboarding/nigeria_kyc/phone_no_basic/:
    post:
      tags: [Nigeria KYC]
      summary: Phone Number Basic
      operationId: phoneBasic
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone_number]
              properties:
                phone_number:
                  type: string
                  example: "08012345678"
      responses:
        "200": { description: Phone basic data retrieved }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/onboarding/nigeria_kyc/phone_no_advanced/:
    post:
      tags: [Nigeria KYC]
      summary: Phone Number Advanced
