              required: [phone_number]
              properties:
                phone_number:
                  type: string
                  example: "08012345678"
      responses:
        "200": { description: Phone advanced data retrieved }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/onboarding/nigeria_kyc/cac/:
    post:
      tags: [Nigeria KYC]
      summary: CAC Verification
      operationId: cac
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [registration_number]
              properties:
                registration_number:
                  type: string
                  example: "RC-123456"
      responses:
        "200": { description: CAC verified }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/onboarding/nigeria_kyc/cac_advanced/:
    post:
      tags: [Nigeria KYC]
      summary: CAC Advanced
      operationId: cacAdvanced
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [registration_number]
              properties:
                registration_number:
                  type: string
                  example: "RC-123456"
      responses:
        "200": { description: CAC advanced data retrieved }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/onboarding/nigeria_kyc/address_verification/:
    post:
      tags: [Nigeria KYC]
      summary: Address Verification
      operationId: addressVerification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                [first_name, last_name, phone_number, address, lga, state]
              properties:
                first_name: { type: string }
                last_name: { type: string }
                phone_number: { type: string }
                address: { type: string }
                lga: { type: string, description: Local Government Area }
                state: { type: string }
      responses:
        "200": { description: Address verification submitted }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/onboarding/nigeria_kyc/digital_address_verification/:
    post:
      tags: [Nigeria KYC]
      summary: Digital Address Verification
      operationId: digitalAddressVerification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                [first_name, last_name, phone_number, address, lga, state]
              properties:
                first_name: { type: string }
                last_name: { type: string }
                phone_number: { type: string }
                address: { type: string }
                lga: { type: string }
                state: { type: string }
      responses:
        "200": { description: Digital address verification submitted }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/onboarding/nigeria_kyc/digital_address_verification_confirmation/:
    post:
      tags: [Nigeria KYC]
      summary: Digital Address Confirmation
      operationId: digitalAddressConfirmation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [identity_check_id]
              properties:
                identity_check_id:
                  type: string
                  description:
                    Reference ID from the digital address verification response
      responses:
        "200": { description: Digital address result retrieved }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/onboarding/nigeria_kyc/physical_address_verification_lagos/:
    post:
      tags: [Nigeria KYC]
      summary: Physical Address (Lagos)
      operationId: physicalAddressLagos
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [first_name, last_name, phone_number, address, lga]
              properties:
                first_name: { type: string }
                last_name: { type: string }
                phone_number: { type: string }
                address: { type: string }
                lga: { type: string, description: LGA within Lagos }
      responses:
        "200": { description: Physical address submitted (Lagos) }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/onboarding/nigeria_kyc/physical_address_verification/:
    post:
      tags: [Nigeria KYC]
      summary: Physical Address (Other States)
      operationId: physicalAddressOther
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                [first_name, last_name, phone_number, address, lga, state]
              properties:
                first_name: { type: string }
                last_name: { type: string }
                phone_number: { type: string }
                address: { type: string }
                lga: { type: string }
                state: { type: string }
      responses:
        "200": { description: Physical address submitted }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/onboarding/nigeria_kyc/physical_address_verification_confirmation/:
    post:
      tags: [Nigeria KYC]
      summary: Physical Address Confirmation
      operationId: physicalAddressConfirmation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [identity_check_id]
              properties:
                identity_check_id:
                  type: integer
                  description:
                    Integer ID from the physical address verification response
      responses:
        "200": { description: Physical address result retrieved }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/onboarding/nigeria_kyc/identity_address/:
    post:
      tags: [Nigeria KYC]
      summary: Address Lookup by NIN
      operationId: identityAddress
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                [first_name, last_name, nin, phone_number, state, time_range]
              properties:
                first_name: { type: string }
                last_name: { type: string }
                nin: { type: string, description: 11-digit NIN }
                phone_number: { type: string }
                state: { type: string }
                time_range:
                  type: integer
                  description: Minimum months address must have been verified
      responses:
        "200": { description: Address data retrieved }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

